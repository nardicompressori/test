<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nardi Compressori – Dew Point Calculator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#CC0000;--bg:#f0f0f0;--white:#fff;
  --text:#1a1a1a;--t2:#555;--t3:#888;
  --bdr:#ddd;--bdr2:#e4e4e4;--gray:#f5f5f5;
  --font:'Segoe UI',system-ui,sans-serif;
  --mono:'Courier New',monospace;
  --r:3px;
}

html,body{height:100%;background:var(--bg)}

/* FIX SCROLL MOBILE */
body{
  font-family:var(--font);
  color:var(--text);
  display:flex;
  flex-direction:column;
  font-size:13px;
  overflow-x:hidden;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* HEADER */
.hdr{
  background:#fff;
  border-bottom:3px solid var(--red);
  display:flex;
  align-items:center;
  height:70px;
  flex-shrink:0;
  z-index:200;
}

.hdr-logo{
  padding:6px 14px;
  border-right:1px solid var(--bdr2);
}

.hdr-title{flex:1;text-align:center}
.hdr-title h1{font-size:.88rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase}
.hdr-title p{font-size:.58rem;color:var(--t3)}

.hdr-ctrls{display:flex;gap:7px;padding:0 12px}

/* APP */
.app-wrap{flex:1;display:flex;min-height:0}

/* LEFT */
.left{
  width:230px;
  background:#fff;
  border-right:1px solid var(--bdr2);
  overflow-y:auto;
}

/* INPUT */
.inp-wrap{
  display:flex;
  border:1.5px solid #d0d0d0;
  background:#fafafa;
}

.inp-wrap input{
  flex:1;
  border:none;
  padding:6px 8px;
  font-size:.95rem;
  font-family:var(--mono);
}

/* RIGHT */
.right{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:8px;
}

/* CANVAS FIX */
#dpCanvas{
  width:100%!important;
  height:100%!important;
}

canvas{
  touch-action:none;
}

/* TABLE */
.res-tbl td{
  padding:4px 10px;
}

.tv{
  font-family:var(--mono);
}

/* MOBILE */
@media(max-width:640px){

  .hdr{
    height:50px;
    padding:0 6px;
  }

  .hdr-logo img{
    height:28px;
  }

  .app-wrap{
    flex-direction:column;
  }

  .left{
    width:100%;
    flex-direction:row;
    flex-wrap:wrap;
  }

  .inp-wrap input{
    font-size:16px;
    padding:10px 8px;
  }

  .inp-unit{
    font-size:.8rem;
  }

  .chart-card{
    height:240px;
  }

  .res-tbl td{
    font-size:.8rem;
  }

  .tv{
    font-size:.9rem;
  }
}

/* TABLET */
@media(min-width:641px) and (max-width:900px){

  .app-wrap{
    flex-direction:column;
  }

  .left{
    width:100%;
    flex-wrap:wrap;
  }

  .inp-grp{
    padding:12px;
  }

  .chart-card{
    height:380px;
  }
}
</style>
</head>

<body>

<div class="hdr">
  <div class="hdr-logo">
    <img src="logo.png" height="36">
  </div>
  <div class="hdr-title">
    <h1>CALCOLATORE PUNTO DI RUGIADA</h1>
    <p>Analisi Umidità Aria Compressa</p>
  </div>
</div>

<div class="app-wrap">

  <div class="left">
    <div class="inp-grp">
      <label>Pressione</label>
      <div class="inp-wrap">
        <input type="number" value="200">
        <span class="inp-unit">bar</span>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="chart-card">
      <canvas id="dpCanvas"></canvas>
    </div>

    <div class="tbl-card">
      <table class="res-tbl">
        <tbody>
          <tr>
            <td class="tn">Parametro</td>
            <td class="tv">Valore</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

</body>
</html>
